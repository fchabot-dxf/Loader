<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Loader</title>
<link rel="stylesheet" href="loader.css" />
</head>
<body>
  <aside id="sidebar">
    <header id="brand">
      <button id="sidebar-collapse" type="button" title="Toggle sidebar" aria-label="Toggle sidebar">‹</button>
      <h1>Loader</h1>
      <div id="project-name" title="Click to rename">untitled project</div>
    </header>
    <nav id="app-list" aria-label="Apps"></nav>
    <footer id="sidebar-footer">
      <button id="reload-app" title="Reload current app">reload</button>
      <button id="pop-out" title="Open current app in new tab">pop out</button>
      <button id="edit-cancel" title="Cancel edits" hidden>cancel</button>
      <button id="open-edit" title="Edit app layout">edit</button>
    </footer>
  </aside>

  <!-- Mobile: slim top bar shown when an app is open -->
  <div id="mobile-topbar">
    <button id="mobile-back" aria-label="Back to app grid">←</button>
    <span id="mobile-appname"></span>
    <button id="mobile-setup-btn" aria-label="Setup">⋯</button>
  </div>

  <!-- Mobile: full-screen app grid (home screen) -->
  <div id="mobile-grid" aria-label="Apps"></div>

  <!-- Library overlay: hidden apps available to re-add in edit mode -->
  <div id="library-panel" hidden></div>

  <main id="stage">
    <div id="welcome">
      <h2>select an app</h2>
      <p>Pick an app from the sidebar. Click <strong>setup</strong> to add or edit entries.</p>
    </div>
    <iframe id="app-frame" hidden allow="clipboard-read; clipboard-write; fullscreen"></iframe>
    <section id="setup-view" hidden>
      <header id="setup-header">
        <h2>Setup</h2>
        <div id="setup-status"></div>
        <button id="setup-close" type="button">done</button>
      </header>
      <p class="setup-help">
        Every app in the registry — all are shown in the sidebar automatically.
        Edit fields inline. Deleting removes an app from the registry everywhere.
      </p>
      <div id="setup-list"></div>
      <footer id="setup-footer">
        <button id="setup-save" type="button">save changes</button>
        <button id="setup-discard" type="button">discard</button>
        <span id="setup-dirty"></span>
      </footer>
    </section>
  </main>
  <script src="js/01-state.js"></script>
  <script src="js/02-pinned.js"></script>
  <script src="js/03-project.js"></script>
  <script src="js/04-welcome.js"></script>
  <script src="js/05-registry.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/icons/ddcs-studio.js"></script>
  <script src="js/icons/b-spline-generator-web-addin.js"></script>
  <script src="js/icons/svg-creator.js"></script>
  <script src="js/icons/geometric-calculator.js"></script>
  <script src="js/icons/calculator.js"></script>
  <script src="js/icons/step-editor.js"></script>
  <script src="js/icons/unitconverter.js"></script>
  <script src="js/icons/pen-plotter.js"></script>
  <script src="js/icons/calendar.js"></script>
  <script src="js/icons/speed-o-meter.js"></script>
  <script src="js/icons/sketch-studio.js"></script>
  <script src="js/icons/quiz-francais.js"></script>
  <script src="js/icons/mathieuconnery.js"></script>
  <script src="js/icons/script-toolbox.js"></script>
  <script src="js/icons/fredericchabot.js"></script>
  <script src="js/06-sidebar.js"></script>
  <script src="js/07-app-open.js"></script>
  <script src="js/08-handshake.js"></script>
  <script src="js/09-broadcast.js"></script>
  <script src="js/10-messages.js"></script>
  <script src="js/11-setup-view.js"></script>
  <script src="js/12-setup-row.js"></script>
  <script src="js/13-setup-save.js"></script>
  <script src="js/16-edit-mode.js"></script>
  <script src="js/14-controls.js"></script>
  <script src="js/15-main.js"></script>
</body>
</html>
